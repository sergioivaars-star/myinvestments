<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon e iconos iOS -->
    <link rel="icon" type="image/svg+xml" href="/myportfolio/favicon.svg" />
    <link rel="apple-touch-icon" href="/myportfolio/icons/icon-152x152.png" />

    <!-- PWA iOS meta tags — CRÍTICOS para que funcione como app en iPhone -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MyPortfolio" />

    <!-- Viewport con viewport-fit=cover para safe area en iPhone X+ -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <!-- Theme color para el color de la barra del navegador -->
    <meta name="theme-color" content="#0f172a" />

    <!-- Splash screens iOS (generados en public/splash/) -->
    <!-- Se pueden generar con pwa-asset-generator -->
    <link
      rel="apple-touch-startup-image"
      href="/myportfolio/splash/splash-2048x2732.png"
      media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2)"
    />
    <link
      rel="apple-touch-startup-image"
      href="/myportfolio/splash/splash-1668x2388.png"
      media="(device-width: 834px) and (device-height: 1194px) and (-webkit-device-pixel-ratio: 2)"
    />
    <link
      rel="apple-touch-startup-image"
      href="/myportfolio/splash/splash-1290x2796.png"
      media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)"
    />
    <link
      rel="apple-touch-startup-image"
      href="/myportfolio/splash/splash-1179x2556.png"
      media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)"
    />
    <link
      rel="apple-touch-startup-image"
      href="/myportfolio/splash/splash-1170x2532.png"
      media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)"
    />
    <link
      rel="apple-touch-startup-image"
      href="/myportfolio/splash/splash-1080x1920.png"
      media="(device-width: 360px) and (device-height: 640px) and (-webkit-device-pixel-ratio: 3)"
    />

    <!-- Prevent text size adjustment on orientation change -->
    <style>
      html {
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }
      /* Ocultar el contenido hasta que React monte (evita flash) */
      #root:empty {
        background-color: #0f172a;
      }
    </style>

    <title>MyPortfolio</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
